version: '3.8'

services:
  # n8n automation orchestrator (free, self-hosted)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: clara-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=clara
      - N8N_BASIC_AUTH_PASSWORD=clara2026
      - GENERIC_TIMEZONE=America/New_York
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
      - ./outputs:/outputs
      - ./scripts:/scripts
    restart: unless-stopped

  # Clara pipeline dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: clara-dashboard
    ports:
      - "5000:5000"
    volumes:
      - ./outputs:/app/outputs
      - ./changelog:/app/changelog
      - ./tasks:/app/tasks
      - ./dashboard:/app/dashboard
    restart: unless-stopped

volumes:
  n8n_data:
